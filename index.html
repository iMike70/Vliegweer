<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vliegweer – DJI Mini 5 Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --sky-dark:#0d1b2a; --sky-mid:#1b2d45; --sky-accent:#4a9eda;
    --cloud:#c8dff0; --text:#e8f4fd; --muted:#7a9ab5;
    --card:#162436; --border:#2a4060;
    --green:#5ecb8c; --amber:#f0b429; --red:#e85d5d;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--sky-dark);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;min-height:100vh;padding:1.5rem 1rem 3rem;}
  header{text-align:center;margin-bottom:1.5rem;}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.3em;color:var(--sky-accent);text-transform:uppercase;margin-bottom:0.3rem;}
  h1{font-size:1.8rem;font-weight:600;letter-spacing:-0.02em;}
  h1 span{color:var(--sky-accent);}
  .subtitle{margin-top:0.3rem;color:var(--muted);font-size:0.82rem;}

  /* GO/NOGO banner */
  .verdict{display:none;max-width:720px;margin:0 auto 1rem;border-radius:12px;padding:1.2rem 1.5rem;text-align:center;}
  .verdict.visible{display:block;}
  .verdict-go{background:#0f2e1a;border:2px solid var(--green);}
  .verdict-warn{background:#2a200a;border:2px solid var(--amber);}
  .verdict-nogo{background:#2a0f0f;border:2px solid var(--red);}
  .verdict-icon{font-size:2.5rem;margin-bottom:0.4rem;}
  .verdict-text{font-size:1.4rem;font-weight:600;}
  .verdict-go .verdict-text{color:var(--green);}
  .verdict-warn .verdict-text{color:var(--amber);}
  .verdict-nogo .verdict-text{color:var(--red);}
  .verdict-sub{font-size:0.82rem;color:var(--muted);margin-top:0.3rem;}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
  .card-title{font-size:0.9rem;font-weight:600;color:var(--cloud);}
  .card-subtitle{font-size:0.75rem;color:var(--muted);}
  .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;}
  .card-row{display:flex;justify-content:space-between;align-items:center;}
  .card-label{font-size:0.8rem;color:var(--muted);}
  .card-value{font-size:0.85rem;font-weight:600;}
  .card-value.ok{color:var(--green);}
  .card-value.warn{color:var(--amber);}
  .card-value.nogo{color:var(--red);}

  /* Drone-specific */
  .drone-row{display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid var(--border);}
  .drone-row:last-child{border-bottom:none;}
  .drone-label{font-size:0.8rem;color:var(--muted);}
  .drone-value{font-size:0.85rem;font-weight:600;}
  .drone-value.ok{color:var(--green);}
  .drone-value.warn{color:var(--amber);}
  .drone-value.nogo{color:var(--red);}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;background:var(--sky-accent);color:var(--sky-dark);font-family:'IBM Plex Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:0.6rem 1.2rem;border:none;border-radius:8px;cursor:pointer;text-decoration:none;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-secondary{background:var(--sky-mid);color:var(--text);}
  .btn-small{padding:0.4rem 0.8rem;font-size:0.75rem;}

  /* Map */
  #map{height:200px;border-radius:8px;margin-top:0.5rem;}

  /* Location */
  #locatieCard{display:none;}

  /* Hidden by default */
  .hidden{display:none;}

  /* Responsive */
  @media (min-width:768px){.card-grid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>

<header>
  <div class="logo">VLIEGWEER</div>
  <h1>DJI Mini 5 <span>Pro</span></h1>
  <div class="subtitle">Weersomstandigheden en luchtruimstatus voor veilig vliegen</div>
</header>

<!-- GO/NOGO Verdict -->
<div id="verdict" class="verdict"></div>

<!-- Main Cards -->
<div class="card">
  <div class="card-header">
    <span class="card-title">📍 Locatie</span>
    <button class="btn btn-small" onclick="getLocation()">🔍 Mijn locatie</button>
  </div>
  <div id="locatieCard">
    <div class="card-row">
      <span class="card-label">Plaats</span>
      <span class="card-value" id="locatieNaam">Onbekend</span>
    </div>
    <div class="card-row">
      <span class="card-label">Coördinaten</span>
      <span class="card-value" id="locatieCoords">--</span>
    </div>
    <div class="card-row">
      <span class="card-label">Adres</span>
      <span class="card-value" id="locatieAdres">--</span>
    </div>
  </div>
  <div id="map"></div>
</div>

<div class="card">
  <div class="card-header">
    <span class="card-title">🌤️ Weer</span>
    <span class="card-subtitle" id="weerLastUpdated">--</span>
  </div>
  <div class="card-grid" id="weerGrid">
    <!-- Weather data will be inserted here -->
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span class="card-title">✈️ Luchtruim</span>
    <span class="card-subtitle" id="luchtruimLastUpdated">--</span>
  </div>
  <div id="luchtruimWaarschuwing" class="hidden" style="margin-bottom:0.75rem;padding:0.5rem;background:rgba(240,180,41,0.1);border-radius:6px;">
    <span style="color:var(--amber);">⚠️ </span>
    <span id="luchtruimWaarschuwingTekst"></span>
  </div>
  <div id="luchtruimRows">
    <!-- Airspace data will be inserted here -->
  </div>
  <div style="margin-top:0.75rem;">
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.3rem;">Handige links:</div>
    <div id="notamLinks"></div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span class="card-title">📜 Regelgeving</span>
  </div>
  <div id="regelgevingRows">
    <!-- Regulations will be inserted here -->
  </div>
</div>

<!-- External Libraries -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" async crossorigin="anonymous"></script>

<script>
// ── Config ───────────────────────────────────────────────────────
const apiKey = 'YOUR_OPENWEATHERMAP_API_KEY'; // Vervang door je eigen API-sleutel

// ── DOM Elements ─────────────────────────────────────────────────
const verdictEl = document.getElementById('verdict');
const weerGrid = document.getElementById('weerGrid');
const weerLastUpdated = document.getElementById('weerLastUpdated');
const luchtruimRows = document.getElementById('luchtruimRows');
const luchtruimLastUpdated = document.getElementById('luchtruimLastUpdated');
const luchtruimWaarschuwing = document.getElementById('luchtruimWaarschuwing');
const luchtruimWaarschuwingTekst = document.getElementById('luchtruimWaarschuwingTekst');

// ── Default Data ────────────────────────────────────────────────
const regelgeving = [
  { rule: "Max. hoogte", waarde: "120m" },
  { rule: "Max. afstand", waarde: "500m" },
  { rule: "Max. windsnelheid", waarde: "12 m/s" },
  { rule: "Min. zicht", waarde: "500m" },
];

const notamLinks = [
  { name: 'FAA NOTAMs', url: 'https://notams.aim.faa.gov/notam/' },
  { name: 'EUR NOTAMs', url: 'https://www.ead.eurocontrol.int/eadbasic/pamslight-9A99999999999999999999' },
  { name: 'NOAA Aviation Weather', url: 'https://aviationweather.gov/notam' },
  { name: 'DroneGuard (officieel NL)', url: 'https://droneguard.nl' },
  { name: 'LVNL Luchtruimkaart', url: 'https://www.lvnl.nl/dienstverlening/luchtruimgebruikers/luchtruimkaart' },
];

// ── Location Handling ────────────────────────────────────────────
let map;
let currentMarker;

function initMap(lat, lon) {
  if (map) map.remove();
  map = L.map('map').setView([lat, lon], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
  
  if (currentMarker) map.removeLayer(currentMarker);
  currentMarker = L.marker([lat, lon]).addTo(map);
}

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        showLocatie(lat, lon, "Huidige locatie", null);
        initMap(lat, lon);
        fetchWeather(lat, lon);
        fetchAirspace(lat, lon);
      },
      (error) => {
        alert(`Fout bij ophalen locatie: ${error.message}`);
      }
    );
  } else {
    alert("Geolocatie wordt niet ondersteund door je browser.");
  }
}

function showLocatie(lat, lon, placeName, fullAddress) {
  const card = document.getElementById('locatieCard');
  if (card) card.style.display = 'block';
  const naam = document.getElementById('locatieNaam');
  const coords = document.getElementById('locatieCoords');
  const adres = document.getElementById('locatieAdres');
  if (naam) naam.textContent = placeName;
  if (coords) coords.textContent = `${lat.toFixed(5)}°N, ${lon.toFixed(5)}°E`;
  if (adres && fullAddress) adres.textContent = fullAddress;
}

// ── Weather Data ─────────────────────────────────────────────────
function fetchWeather(lat, lon) {
  const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=nl`;
  
  fetch(url)
    .then(response => {
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      return response.json();
    })
    .then(data => {
      renderWeather(data);
      weerLastUpdated.textContent = `Laatst bijgewerkt: ${new Date().toLocaleTimeString('nl-NL')}`;
    })
    .catch(error => {
      console.error('Fout bij ophalen weerdata:', error);
      weerGrid.innerHTML = '<div class="card-row"><span class="card-label">Fout</span><span class="card-value nogo">Weerdata niet beschikbaar</span></div>';
    });
}

function renderWeather(data) {
  const weather = {
    temp: { label: 'Temperatuur', value: `${Math.round(data.main.temp)}°C`, status: 'ok' },
    wind: { label: 'Wind', value: `${Math.round(data.wind.speed * 3.6)} km/u`, status: data.wind.speed > 12 ? 'nogo' : 'ok' },
    gusts: { label: 'Windstoten', value: data.wind.gust ? `${Math.round(data.wind.gust * 3.6)} km/u` : 'Geen', status: data.wind.gust && data.wind.gust > 15 ? 'nogo' : 'ok' },
    visibility: { label: 'Zicht', value: `${Math.round(data.visibility / 1000)} km`, status: data.visibility < 500 ? 'nogo' : 'ok' },
    humidity: { label: 'Luchtvochtigheid', value: `${data.main.humidity}%`, status: 'ok' },
    pressure: { label: 'Luchtdruk', value: `${data.main.pressure} hPa`, status: 'ok' },
    clouds: { label: 'Bewolking', value: `${data.clouds.all}%`, status: data.clouds.all > 80 ? 'warn' : 'ok' },
    rain: { label: 'Regen', value: data.rain ? `${data.rain['1h'] || 0} mm/u` : 'Geen', status: data.rain && data.rain['1h'] > 0.5 ? 'nogo' : 'ok' },
  };

  weerGrid.innerHTML = Object.values(weather).map(w => `
    <div class="card-row">
      <span class="card-label">${w.label}</span>
      <span class="card-value ${w.status}">${w.value}</span>
    </div>
  `).join('');

  updateVerdict();
}

// ── Airspace Data ───────────────────────────────────────────────
function fetchAirspace(lat, lon) {
  // Simulated airspace data (replace with actual API calls)
  const warnings = [];
  const rows = [];

  // Example: Check for controlled airspace
  if (lat > 52 && lat < 53 && lon > 4 && lon < 5) {
    warnings.push('Je bevindt je in gecontroleerde luchtruimte (CTR Amsterdam).');
    rows.push({ l: 'Luchtruimte', v: 'CTR Amsterdam', c: 'nogo' });
  } else {
    rows.push({ l: 'Luchtruimte', v: 'Ongecontroleerd', c: 'ok' });
  }

  // Example: Check for restricted areas
  if (lat > 51.5 && lat < 52.5 && lon > 5.5 && lon < 6.5) {
    warnings.push('Let op: Beperkt gebied (Militair oefenterrein).');
    rows.push({ l: 'Beperking', v: 'Militair oefenterrein', c: 'nogo' });
  }

  // Render warnings
  if (warnings.length) {
    luchtruimWaarschuwing.style.display = 'block';
    luchtruimWaarschuwingTekst.innerHTML = warnings.map(w => `⚠️ ${w}`).join('<br><br>');
  } else {
    luchtruimWaarschuwing.style.display = 'none';
  }

  // Render rows
  if (!rows.length) rows.push({ l: '✅ Geen bekende vaste beperkingen', v: 'in directe omgeving', c: 'ok' });
  luchtruimRows.innerHTML = rows.map(r => `
    <div class="drone-row">
      <span class="drone-label">${r.l}</span>
      <span class="drone-value ${r.c}">${r.v}</span>
    </div>
  `).join('');

  luchtruimLastUpdated.textContent = `Laatst bijgewerkt: ${new Date().toLocaleTimeString('nl-NL')}`;
  updateVerdict();

  // Render NOTAM links
  document.getElementById('notamLinks').innerHTML = notamLinks.map(l => `
    <a href="${l.url}" target="_blank" style="display:block;color:var(--sky-accent);margin-bottom:0.3rem;">→ ${l.name}</a>
  `).join('');

  // Render regelgeving
  document.getElementById('regelgevingRows').innerHTML = regelgeving.map(r => `
    <div class="drone-row">
      <span class="drone-label">${r.rule}</span>
      <span class="drone-value" style="color:var(--cloud);text-align:right;max-width:55%;font-size:0.75rem;">${r.waarde}</span>
    </div>
  `).join('');
}

// ── Verdict Logic ────────────────────────────────────────────────
function updateVerdict() {
  const weatherStatuses = Array.from(weerGrid.querySelectorAll('.card-value')).map(el => el.classList.contains('nogo') ? 'nogo' : el.classList.contains('warn') ? 'warn' : 'ok');
  const airspaceStatuses = Array.from(luchtruimRows.querySelectorAll('.drone-value')).map(el => el.classList.contains('nogo') ? 'nogo' : el.classList.contains('warn') ? 'warn' : 'ok');
  
  const allStatuses = [...weatherStatuses, ...airspaceStatuses];
  
  if (allStatuses.includes('nogo')) {
    verdictEl.className = 'verdict verdict-nogo visible';
    verdictEl.innerHTML = `
      <div class="verdict-icon">❌</div>
      <div class="verdict-text">NO GO</div>
      <div class="verdict-sub">Vliegen afgeraden</div>
    `;
  } else if (allStatuses.includes('warn')) {
    verdictEl.className = 'verdict verdict-warn visible';
    verdictEl.innerHTML = `
      <div class="verdict-icon">⚠️</div>
      <div class="verdict-text">WAARSCHUWING</div>
      <div class="verdict-sub">Vliegen met voorzichtigheid</div>
    `;
  } else {
    verdictEl.className = 'verdict verdict-go visible';
    verdictEl.innerHTML = `
      <div class="verdict-icon">✅</div>
      <div class="verdict-text">GO</div>
      <div class="verdict-sub">Vliegen toegestaan</div>
    `;
  }
}

// ── Initialize ───────────────────────────────────────────────────
window.onload = () => {
  // Default location: Amsterdam
  const defaultLat = 52.3676;
  const defaultLon = 4.9041;
  showLocatie(defaultLat, defaultLon, "Amsterdam", "Amsterdam, Nederland");
  initMap(defaultLat, defaultLon);
  fetchWeather(defaultLat, defaultLon);
  fetchAirspace(defaultLat, defaultLon);
};
</script>

</body>
</html>
